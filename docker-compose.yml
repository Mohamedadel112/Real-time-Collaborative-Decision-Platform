version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: collab-decision-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: decision_user
      POSTGRES_PASSWORD: decision_pass
      POSTGRES_DB: collaborative_decisions
    ports:
      - '5433:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: collab-decision-redis
    restart: unless-stopped
    command: redis-server --requirepass redis_pass
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
